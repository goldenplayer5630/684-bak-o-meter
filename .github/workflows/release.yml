name: Release Linux App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  TEST_PROJECT: './684BakOMeter.Tests/684BakOMeter.Tests.csproj'
  APP_PROJECT: './684BakOMeter.Web/684BakOMeter.Web.csproj'
  APP_NAME: '684BakOMeter'
  RUNTIME: 'linux-x64'
  PUBLISH_DIR: './publish'
  DIST_DIR: './dist'
  ARCHIVE_NAME: '684BakOMeter-linux-x64.tar.gz'
  CHECKSUM_NAME: '684BakOMeter-linux-x64.tar.gz.sha256'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build test project
        run: dotnet build "${{ env.TEST_PROJECT }}" --configuration Release --no-restore

      - name: Run xUnit tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --configuration Release --no-build --verbosity normal

  build_and_release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: 684BakOMeter.Web/Frontend
        run: npm ci

      - name: Build frontend
        working-directory: 684BakOMeter.Web/Frontend
        run: npm run build

      - name: Restore app project
        run: dotnet restore "${{ env.APP_PROJECT }}"

      - name: Publish app for Linux (framework-dependent)
        run: |
          dotnet publish "${{ env.APP_PROJECT }}" \
            --configuration Release \
            --runtime "${{ env.RUNTIME }}" \
            --self-contained false \
            --output "${{ env.PUBLISH_DIR }}"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Build EF Core migration bundle
        run: |
          dotnet ef migrations bundle \
            --project "${{ env.APP_PROJECT }}" \
            --startup-project "${{ env.APP_PROJECT }}" \
            --configuration Release \
            --runtime "${{ env.RUNTIME }}" \
            --self-contained false \
            --output "${{ env.PUBLISH_DIR }}/efbundle" \
            --force
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Database=dummy"

      - name: Add VERSION file
        run: |
          echo "${GITHUB_REF_NAME}" > "${{ env.PUBLISH_DIR }}/VERSION"

      - name: Create archive and checksum
        run: |
          mkdir -p "${{ env.DIST_DIR }}"
          tar -czf "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" -C "${{ env.PUBLISH_DIR }}" .
          sha256sum "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" > "${{ env.DIST_DIR }}/${{ env.CHECKSUM_NAME }}"

      - name: Prepare Debian package staging
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p staging/package staging/systemd staging/linux staging/scripts
          cp -a "${{ env.PUBLISH_DIR }}/." staging/package/
          cp deploy/systemd/684bakometer.service staging/systemd/
          cp deploy/linux/684bakometer-update.sh staging/linux/
          cp deploy/scripts/postinstall.sh staging/scripts/
          cp deploy/scripts/preremove.sh staging/scripts/
          cp deploy/scripts/postremove.sh staging/scripts/

      - name: Install nFPM
        run: |
          curl -fsSL https://github.com/goreleaser/nfpm/releases/download/v2.41.1/nfpm_2.41.1_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin nfpm

      - name: Build Debian package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd staging
          VERSION="${VERSION}" nfpm package \
            --config ../deploy/nfpm.yaml \
            --packager deb \
            --target "../${{ env.DIST_DIR }}/684bakometer_${VERSION}_amd64.deb"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" \
            "${{ env.DIST_DIR }}/${{ env.CHECKSUM_NAME }}" \
            ${{ env.DIST_DIR }}/684bakometer_*_amd64.deb \
            --clobber