name: Build and Release Linux App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore test project
        run: dotnet restore 684BakOMeter.Tests/684BakOMeter.Tests.csproj

      - name: Build test project
        run: dotnet build 684BakOMeter.Tests/684BakOMeter.Tests.csproj --configuration Release --no-restore

      - name: Run xUnit tests
        run: dotnet test 684BakOMeter.Tests/684BakOMeter.Tests.csproj --configuration Release --no-build --verbosity normal

  build-release:
    runs-on: ubuntu-latest
    needs: test

    env:
      PROJECT_PATH: src/YourApp/YourApp.csproj
      APP_NAME: arcade-app
      RUNTIME: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore app
        run: dotnet restore "$PROJECT_PATH"

      - name: Publish app
        run: |
          dotnet publish "$PROJECT_PATH" \
            --configuration Release \
            --runtime $RUNTIME \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            --output ./publish

      - name: Add version file
        run: echo "${GITHUB_REF_NAME}" > ./publish/VERSION

      - name: Pack release
        run: |
          mkdir -p ./dist
          tar -czf "./dist/${APP_NAME}.tar.gz" -C ./publish .
          sha256sum "./dist/${APP_NAME}.tar.gz" > "./dist/${APP_NAME}.tar.gz.sha256"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" ./dist/* --clobber