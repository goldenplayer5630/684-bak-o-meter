name: Release Linux App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_VERSION: '8.0.x'
  TEST_PROJECT: './684BakOMeter.Tests/684BakOMeter.Tests.csproj'
  APP_PROJECT: './684BakOMeter.Web/684BakOMeter.Web.csproj'
  APP_NAME: '684BakOMeter'
  RUNTIME: 'linux-x64'
  PUBLISH_DIR: './publish'
  DIST_DIR: './dist'
  ARCHIVE_NAME: '684BakOMeter-linux-x64.tar.gz'
  CHECKSUM_NAME: '684BakOMeter-linux-x64.tar.gz.sha256'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore test project
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build test project
        run: dotnet build "${{ env.TEST_PROJECT }}" --configuration Release --no-restore

      - name: Run xUnit tests
        run: dotnet test "${{ env.TEST_PROJECT }}" --configuration Release --no-build --verbosity normal

  build_and_release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore app project
        run: dotnet restore "${{ env.APP_PROJECT }}"

      - name: Publish app for Linux
        run: |
          dotnet publish "${{ env.APP_PROJECT }}" \
            --configuration Release \
            --runtime "${{ env.RUNTIME }}" \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:IncludeNativeLibrariesForSelfExtract=true \
            --output "${{ env.PUBLISH_DIR }}"

      - name: Add VERSION file
        run: |
          echo "${GITHUB_REF_NAME}" > "${{ env.PUBLISH_DIR }}/VERSION"

      - name: Create archive and checksum
        run: |
          mkdir -p "${{ env.DIST_DIR }}"
          tar -czf "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" -C "${{ env.PUBLISH_DIR }}" .
          sha256sum "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" > "${{ env.DIST_DIR }}/${{ env.CHECKSUM_NAME }}"

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated release for ${GITHUB_REF_NAME}"

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ env.DIST_DIR }}/${{ env.ARCHIVE_NAME }}" \
            "${{ env.DIST_DIR }}/${{ env.CHECKSUM_NAME }}" \
            --clobber